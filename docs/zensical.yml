site_name: rkvc — RK3588 Video Codec
site_description: RK3588 H.265 硬件视频编解码 C 库文档
site_url: https://example.com/rkvc
repo_url: https://github.com/example/rkvc
repo_name: rkvc

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - API 参考: api.md
  - 架构: architecture.md
  - 基准测试: benchmark.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true
