name: Test

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build libcmocka-dev nasm

      - name: Build ffmpeg-rockchip
        run: |
          cd third_party/ffmpeg-rockchip
          ./configure --disable-doc --disable-programs --disable-x86asm \
            --disable-avdevice --disable-avfilter --disable-postproc \
            --disable-swresample --disable-network
          make -j$(nproc)

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRKVC_BUILD_TESTS=ON

      - name: Build
        run: ninja -C build

      - name: Test
        run: cd build && ctest --output-on-failure --output-junit results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/results.xml
