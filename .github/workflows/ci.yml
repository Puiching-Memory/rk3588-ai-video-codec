name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: clang-tidy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-tidy

      - name: Generate ffmpeg config headers
        run: |
          cd third_party/ffmpeg-rockchip
          ./configure --disable-everything --disable-doc --disable-programs --disable-x86asm

      - name: Create compile_commands.json
        run: |
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          clang-tidy -p build \
            --header-filter=include/.* \
            lib/*.c 2>&1 | tee tidy-report.txt
          # 允许警告但不允许错误
          ! grep "error:" tidy-report.txt

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build libcmocka-dev nasm libdrm-dev

      - name: Build ffmpeg-rockchip
        run: |
          cd third_party/ffmpeg-rockchip
          ./configure --enable-pic --enable-version3 --disable-everything \
            --disable-doc --disable-programs --disable-x86asm \
            --disable-avdevice --disable-avfilter --disable-postproc \
            --disable-swscale --disable-swresample --disable-network \
            --enable-rkmpp --enable-libdrm \
            --enable-encoder=hevc_rkmpp \
            --enable-decoder=hevc_rkmpp --enable-decoder=hevc \
            --enable-muxer=hevc --enable-muxer=matroska --enable-muxer=mp4 --enable-muxer=mpegts \
            --enable-demuxer=hevc --enable-demuxer=matroska --enable-demuxer=mov --enable-demuxer=mpegts \
            --enable-parser=hevc \
            --enable-protocol=file --enable-protocol=pipe
          make -j$(nproc)

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRKVC_BUILD_TESTS=ON

      - name: Build
        run: ninja -C build

      - name: Test
        run: cd build && ctest --output-on-failure --output-junit results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/results.xml

  package:
    name: Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build patchelf nasm libdrm-dev

      - name: Build ffmpeg-rockchip
        run: |
          cd third_party/ffmpeg-rockchip
          ./configure --enable-pic --enable-version3 --disable-everything \
            --disable-doc --disable-programs --disable-x86asm \
            --disable-avdevice --disable-avfilter --disable-postproc \
            --disable-swscale --disable-swresample --disable-network \
            --enable-rkmpp --enable-libdrm \
            --enable-encoder=hevc_rkmpp \
            --enable-decoder=hevc_rkmpp --enable-decoder=hevc \
            --enable-muxer=hevc --enable-muxer=matroska --enable-muxer=mp4 --enable-muxer=mpegts \
            --enable-demuxer=hevc --enable-demuxer=matroska --enable-demuxer=mov --enable-demuxer=mpegts \
            --enable-parser=hevc \
            --enable-protocol=file --enable-protocol=pipe
          make -j$(nproc)

      - name: Build and package
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          ninja -C build package

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: build/packages/*.tar.gz
