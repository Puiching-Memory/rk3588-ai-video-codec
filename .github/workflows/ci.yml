name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: clang-tidy
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-tidy

      - name: Install librga
        run: |
          git clone --depth 1 https://github.com/airockchip/librga.git /tmp/librga
          sudo mkdir -p /usr/local/include/rga
          sudo cp /tmp/librga/include/*.h /usr/local/include/rga/
          sudo cp /tmp/librga/libs/Linux/gcc-aarch64/librga.so /usr/local/lib/
          sudo ldconfig

      - name: Generate ffmpeg config headers
        run: |
          cd third_party/ffmpeg-rockchip
          ./configure --disable-everything --disable-doc --disable-programs

      - name: Create compile_commands.json
        run: |
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          clang-tidy -p build \
            --header-filter=include/.* \
            lib/*.c 2>&1 | tee tidy-report.txt
          # 允许警告但不允许错误
          ! grep "error:" tidy-report.txt

  test:
    name: Unit Tests
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build libcmocka-dev libdrm-dev

      - name: Install librga
        run: |
          git clone --depth 1 https://github.com/airockchip/librga.git /tmp/librga
          sudo mkdir -p /usr/local/include/rga
          sudo cp /tmp/librga/include/*.h /usr/local/include/rga/
          sudo cp /tmp/librga/libs/Linux/gcc-aarch64/librga.so /usr/local/lib/
          sudo ldconfig

      - name: Build MPP
        run: |
          cmake -B /tmp/mpp-build -S third_party/mpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/mpp-install
          cmake --build /tmp/mpp-build -j$(nproc)
          cmake --install /tmp/mpp-build

      - name: Build ffmpeg-rockchip
        run: |
          cd third_party/ffmpeg-rockchip
          export PKG_CONFIG_PATH=/tmp/mpp-install/lib/pkgconfig:$PKG_CONFIG_PATH
          ./configure --enable-pic --enable-version3 --disable-everything \
            --disable-doc --disable-programs \
            --disable-avdevice --disable-avfilter --disable-postproc \
            --disable-swscale --disable-swresample --disable-network \
            --enable-rkmpp --enable-libdrm \
            --enable-encoder=hevc_rkmpp \
            --enable-decoder=hevc_rkmpp --enable-decoder=hevc \
            --enable-muxer=hevc --enable-muxer=matroska --enable-muxer=mp4 --enable-muxer=mpegts \
            --enable-demuxer=hevc --enable-demuxer=matroska --enable-demuxer=mov --enable-demuxer=mpegts \
            --enable-parser=hevc \
            --enable-protocol=file --enable-protocol=pipe
          make -j$(nproc)

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRKVC_BUILD_TESTS=ON \
            -DMPP_BUILD_DIR=/tmp/mpp-build

      - name: Build
        run: ninja -C build

      - name: Test
        env:
          RKVC_VALGRIND_HARDWARE: "0"
        run: cd build && ctest --output-on-failure --output-junit results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: build/results.xml

  package:
    name: Package
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build patchelf libdrm-dev

      - name: Install librga
        run: |
          git clone --depth 1 https://github.com/airockchip/librga.git /tmp/librga
          sudo mkdir -p /usr/local/include/rga
          sudo cp /tmp/librga/include/*.h /usr/local/include/rga/
          sudo cp /tmp/librga/libs/Linux/gcc-aarch64/librga.so /usr/local/lib/
          sudo ldconfig

      - name: Build MPP
        run: |
          cmake -B /tmp/mpp-build -S third_party/mpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/mpp-install
          cmake --build /tmp/mpp-build -j$(nproc)
          cmake --install /tmp/mpp-build

      - name: Build ffmpeg-rockchip
        run: |
          cd third_party/ffmpeg-rockchip
          export PKG_CONFIG_PATH=/tmp/mpp-install/lib/pkgconfig:$PKG_CONFIG_PATH
          ./configure --enable-pic --enable-version3 --disable-everything \
            --disable-doc --disable-programs \
            --disable-avdevice --disable-avfilter --disable-postproc \
            --disable-swscale --disable-swresample --disable-network \
            --enable-rkmpp --enable-libdrm \
            --enable-encoder=hevc_rkmpp \
            --enable-decoder=hevc_rkmpp --enable-decoder=hevc \
            --enable-muxer=hevc --enable-muxer=matroska --enable-muxer=mp4 --enable-muxer=mpegts \
            --enable-demuxer=hevc --enable-demuxer=matroska --enable-demuxer=mov --enable-demuxer=mpegts \
            --enable-parser=hevc \
            --enable-protocol=file --enable-protocol=pipe
          make -j$(nproc)

      - name: Build and package
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMPP_BUILD_DIR=/tmp/mpp-build
          ninja -C build package

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: build/packages/*.tar.gz
