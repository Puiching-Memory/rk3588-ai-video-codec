[project]
site_name = "rk3588-ai-video-codec"
site_description = "RK3588 FFmpeg VPU benchmark CLI with throughput, quality, and plotting workflows."
copyright = """
Copyright &copy; 2026 rk3588-ai-video-codec contributors
"""
docs_dir = "docs"
site_dir = "site"
language = "zh"
nav = [
    { "概览" = "index.md" },
    { "开始使用" = "getting-started.md" },
    { "CLI 参考" = "cli.md" },
    { "结果与图表" = "results.md" },
    { "AI 视频编解码时间线" = "ai-video-codec-timeline.md" },
    { "开发说明" = "development.md" },
]
extra_css = ["stylesheets/extra.css"]

[project.theme]
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "teal"
toggle.icon = "lucide/moon"
toggle.name = "切换到深色模式"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "切换到浅色模式"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true