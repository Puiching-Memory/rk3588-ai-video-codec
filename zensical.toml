[project]
site_name = "rkvc — RK3588 Video Codec"
site_description = "RK3588 多码率视频编解码 C 库文档 (v2: Session + Codec Router)"
site_url = "https://puiching-memory.github.io/rk3588-ai-video-codec/"
repo_url = "https://github.com/Puiching-Memory/rk3588-ai-video-codec"
repo_name = "rkvc"

nav = [
  { "首页" = "index.md" },
  { "快速开始" = "getting-started.md" },
  { "架构" = "architecture.md" },
  { "API 参考" = "api.md" },
  { "v1 迁移" = "migration.md" },
  { "测试" = "testing.md" },
  { "基准测试" = "benchmark.md" },
  { "打包与分发" = "packaging.md" },
  { "交付文档" = "delivery.md" },
]

[theme]
name = "material"
language = "zh"
features = ["navigation.tabs"]

[[theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
accent = "blue"

[[theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
accent = "blue"
